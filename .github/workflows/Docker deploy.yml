name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_COMPOSE_FILE: docker-compose.ci.yml
  DEPLOYMENT_DIR: /opt/liveprofile

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} build app
        docker images

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Create deployment directory
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "sudo mkdir -p ${{ env.DEPLOYMENT_DIR }} && sudo chown ${{ secrets.SSH_USER }} ${{ env.DEPLOYMENT_DIR }}"

    - name: Copy compose file and environment
      run: |
        # Создаем .env файл с секретами
        cat << EOF > .env
        API_ID=${{ secrets.API_ID }}
        API_HASH=${{ secrets.API_HASH }}
        SESSION_STRING=${{ secrets.SESSION_STRING }}
        TZ=Europe/Moscow
        EOF
        
        # Копируем файлы на сервер
        scp -o StrictHostKeyChecking=no ${{ env.DOCKER_COMPOSE_FILE }} \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOYMENT_DIR }}/
        scp -o StrictHostKeyChecking=no .env \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOYMENT_DIR }}/

    - name: Build and deploy on server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ${{ env.DEPLOYMENT_DIR }}
          
          # Останавливаем и удаляем старый контейнер
          docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} down || true
          
          # Удаляем старый образ чтобы освободить место
          docker image prune -f
          
          # Pull или build образа (в зависимости от вашей стратегии)
          # Если используете Docker Hub:
          # docker pull ваш-username/liveprofile:latest
          
          # Или собираем на сервере:
          docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} build --no-cache app
          
          # Запускаем контейнер
          docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d
          
          # Проверяем статус
          docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} ps
          docker logs liveprofile --tail 20
        EOF

    - name: Health check
      run: |
        # Ждем 10 секунд для старта контейнера
        sleep 10
        ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "docker ps --filter 'name=liveprofile' --format 'table {{.Names}}\t{{.Status}}' && \
           docker logs liveprofile --tail 10"
