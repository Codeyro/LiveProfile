name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/liveprofile-app
  DEPLOY_DIR: /opt/liveprofile

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env and Archive
        run: |
          echo "API_ID='${{ secrets.API_ID }}'" > .env
          echo "API_HASH='${{ secrets.API_HASH }}'" >> .env
          echo "SESSION_STRING='${{ secrets.SESSION_STRING }}'" >> .env
          echo "TZ=Europe/Moscow" >> .env
          tar -czf configs.tar.gz .env docker-compose.yml

      - name: Copy configs to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "configs.tar.gz"
          target: ${{ env.DEPLOY_DIR }}

      - name: Run Docker commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}
            
            # Распаковка конфигов
            tar -xzf configs.tar.gz --overwrite
            
            # Авторизация в реестре на сервере
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "🚀 Обновляем контейнеры..."
            docker compose pull
            docker compose up -d --remove-orphans
            
            echo "🧹 Удаляем старые образы..."
            docker image prune -f
            
            echo "✅ Статус:"
            docker compose ps