name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/codeyro/liveprofile
  CONTAINER_NAME: liveprofile
  DEPLOY_PATH: /home/${{ secrets.SSH_USER }}/liveprofile

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TZ=${{ secrets.TZ || 'Europe/Moscow' }}
            API_ID=${{ secrets.API_ID }}
            API_HASH=${{ secrets.API_HASH }}
            SESSION_STRING=${{ secrets.SESSION_STRING }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SSHEOF'

          # Create app directory
          mkdir -p ${{ env.DEPLOY_PATH }}
          SSHEOF

          # Copy docker-compose.yml from repo
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.SSH_PORT || 22 }} \
            docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

          # Continue deployment
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SSHEOF'

          cd ${{ env.DEPLOY_PATH }}

          # Create .env file
          cat > .env << 'ENVEOF'
          TZ=${{ secrets.TZ || 'Europe/Moscow' }}
          API_ID=${{ secrets.API_ID }}
          API_HASH=${{ secrets.API_HASH }}
          SESSION_STRING=${{ secrets.SESSION_STRING }}
          ENVEOF

          # Docker login
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Stop old container if exists
          docker-compose down --rmi all 2>/dev/null || true

          # Pull latest image
          docker pull ${{ env.IMAGE_NAME }}

          # Start new container
          docker compose up -d

          # Show status
          echo "Container Status:"
          docker ps -a | grep ${{ env.CONTAINER_NAME }}
          echo "Last 10 logs:"
          docker logs -n 10 ${{ env.CONTAINER_NAME }}
          SSHEOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
