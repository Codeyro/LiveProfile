name: Build & Deploy

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: codeyro/liveprofile
  DEPLOY_DIR: ~/

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx    

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env and Archive
        run: |
          echo "API_ID='${{ secrets.API_ID }}'" > .env
          echo "API_HASH='${{ secrets.API_HASH }}'" >> .env
          echo "SESSION_STRING='${{ secrets.SESSION_STRING }}'" >> .env
          echo "TZ=Europe/Moscow" >> .env
          tar -czf configs.tar.gz .env docker-compose.yml

      - name: Copy configs to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "configs.tar.gz"
          target: ${{ env.DEPLOY_DIR }}

      - name: Run Docker commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR  # Безопасная передача
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            # Проверка и установка Docker
            if ! command -v docker &> /dev/null; then
              echo "Устанавливаем Docker..."
              sudo apt-get update -qq
              sudo apt-get install -y docker.io docker-compose-plugin
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # Распаковка
            tar -xzf configs.tar.gz --overwrite

            # Логин (с env)
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            echo "Обновляем контейнеры..."
            docker compose pull
            docker compose down  # Добавлено для чистоты
            docker compose up -d --remove-orphans

            echo "Удаляем старые образы..."
            docker image prune -f

            echo "Статус:"
            docker compose ps